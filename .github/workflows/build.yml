name: Build Remnawave Node

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - Dockerfile
      - versions.env
      - ".github/workflows/build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERFILE: ./Dockerfile

permissions:
  contents: read
  packages: write

concurrency:
  group: build-remnawave-node
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Read versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          source versions.env

          if [[ -z "${REMNA_VERSION:-}" ]]; then
            echo "REMNA_VERSION is not set."
            exit 1
          fi

          if [[ -z "${XRAY_VERSION:-}" ]]; then
            echo "XRAY_VERSION is not set."
            exit 1
          fi

          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          VERSION_TAG="remna-${REMNA_VERSION}-xray-${XRAY_VERSION}"

          echo "remna=${REMNA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "xray=${XRAY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

          echo "Image: ${IMAGE}"
          echo "Combination: ${VERSION_TAG}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check whether combination already exists
        id: check
        shell: bash
        env:
          IMAGE: ${{ steps.versions.outputs.image }}
          VERSION_TAG: ${{ steps.versions.outputs.version_tag }}
        run: |
          set -euo pipefail

          TARGET="${IMAGE}:${VERSION_TAG}"

          if docker buildx imagetools inspect "${TARGET}" >/dev/null 2>&1; then
            echo "Image already exists: ${TARGET}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image does not exist: ${TARGET}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Restore image aliases
        if: steps.check.outputs.exists == 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.versions.outputs.image }}
          VERSION_TAG: ${{ steps.versions.outputs.version_tag }}
          XRAY_VERSION: ${{ steps.versions.outputs.xray }}
        run: |
          set -euo pipefail
      
          docker buildx imagetools create \
            --tag "${IMAGE}:${XRAY_VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION_TAG}"

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          pull: true
          push: true

          platforms: |
            linux/amd64
            linux/arm64

          build-args: |
            REMNA_VERSION=${{ steps.versions.outputs.remna }}
            XRAY_VERSION=${{ steps.versions.outputs.xray }}

          tags: |
            ${{ steps.versions.outputs.image }}:${{ steps.versions.outputs.version_tag }}
            ${{ steps.versions.outputs.image }}:${{ steps.versions.outputs.xray }}
            ${{ steps.versions.outputs.image }}:latest

          labels: |
            io.remnawave.version=${{ steps.versions.outputs.remna }}
            io.xray.version=${{ steps.versions.outputs.xray }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false